version: '3.9'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: wayout_db
      POSTGRES_USER: wayout_user
      POSTGRES_PASSWORD: wayout_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
      - media_files:/app/media
    ports:
      - "8000:8000"
    environment:
      - DEBUG=True
      - DB_HOST=db
      - DB_NAME=wayout_db
      - DB_USER=wayout_user
      - DB_PASSWORD=wayout_password
      - DB_PORT=5432
      - SECRET_KEY=dev-secret-key-change-in-production
    depends_on:
      - db
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
    environment:
      - REACT_APP_API_URL=http://localhost:8000/api
    depends_on:
      - backend

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    volumes:
      - ./admin/src:/app/src
    environment:
      - REACT_APP_ADMIN_API_URL=http://localhost:8000/api
      - PORT=3001
    depends_on:
      - backend

volumes:
  postgres_data:
  media_files:
